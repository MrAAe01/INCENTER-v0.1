<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAE DESIGN | Portfolio</title>
    
    <link rel="icon" type="image/jpeg" href="INCENTER - Copy.jpeg">

    <style>
        /* إعدادات الصفحة الأساسية والتوسيط */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fdfaf5 url('https://www.transparenttextures.com/patterns/cubes.png'); /* خلفية هادئة ومنقوشة احترافية */
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: var(--text);
            line-height: 1.6;
            background-image:url(luxury.jpg);
            background-repeat: no-repeat;
            background-position: center;
        }

        .profile-card {
            text-align: center;
            background: #644b1d;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #d4af37;
            box-shadow: 0 10px 30px #1b170f;
            max-width: 400px;
            width: 90%;
        }

        /* مكان صورة المصمم الشخصية */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #d4af37;
            object-fit: cover;
            margin-bottom: 15px;
            background-color: #222;
        }

        h1 {
            margin: 10px 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .role {
            color: #fff;
            font-size: 14px;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        /* الأزرار والروابط */
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-item {
            display: block;
            padding: 12px;
            border: 1px solid #d4af37;
            border-radius: 8px;
            color: #d4af37;
            text-decoration: none;
            transition: 0.3s;
            font-weight: bold;
        }

        .link-item:hover {
            background-color: #d4af37;
            color: #000;
        }

        .contact-info {
            margin-top: 20px;
            font-size: 13px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="AAe Design.jpg" alt="اسم المصمم" class="profile-img">
        
        <h1>Mr Abdelilah</h1>
        <p class="role">مصمم ومطور مواقع ويب</p>

        <div class="links">
            <a href="https://github.com/MrAAe01" target="_blank" class="link-item">GitHub Profile</a>
            
            <a href="abdo26adour@gmail.com" class="link-item">البريد الإلكتروني</a>
        </div>

        <div class="contact-info">
            <p>Phone Number : 0632241001</p>
            <hr style="border: 0.5px solid #333;">
            <p>© 2026 AAE DESIGN</p>
        </div>
    </div>

</body>
</html>
