<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="INCENTER - Copy.jpeg">
    <title>INCENTER | صوتك يصنع الفرق</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <p>INCENTER</p>
    </nav>

    <header class="hero">
        <h1>صوتك يصنع الفرق</h1>
        <br>
        <a href="#suggest" class="btn-main">شاركنا فكرتك الآن</a>
    </header>

    <section id="news" class="container">
        <div id="notion-news-container" class="grid">
            
        </div>
    </section>

    <section id="suggest" class="container alt-bg">
        <h2 class="section-title">صندوق الأفكار</h2>
        <form id="suggestion-form" class="pro-form">
            <input type="text" name="name" placeholder="اسمك الكامل" required>
            <input type="email" name="email" placeholder="بريدك الإلكتروني" required>
            <textarea name="idea" placeholder="اشرح فكرتك هنا..." rows="5" required></textarea>
            <button type="submit" class="btn-submit">إرسال الفكرة</button>
        </form>
    </section>

    <footer>
        <p>جميع الحقوق محفوظة © 2026 INCENTER</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
