<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية | INCENTER</title>
    <link rel="icon" type="image/jpeg" href="INCENTER - Copy.jpeg">
    
    <style>
        :root {
            --gold: #d4af37;
            --soft-beige: rgba(245, 230, 211, 0.95);
            --dark: rgba(245, 230, 211, 0.9);
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #fdfaf5 url('https://www.transparenttextures.com/patterns/cubes.png'); /* خلفية هادئة ومنقوشة احترافية */
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: var(--text);
            line-height: 1.6;
        }

        /* الهيدر (الشعار والقائمة) */
        header {
            height: 10vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: rgba(105, 84, 10, 0.8);
            border-bottom: 1px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area img {
            height: 50px;
            border-radius: 5px;
        }

        /* الشبكة الرئيسية - Full Screen Grid */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 45vh); /* تقسيم الشاشة لأربعة أقسام متساوية */
            width: 100%;
            height: 90vh;
        }

        .grid-item {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            transition: 0.5s ease;
            text-decoration: none;
            color: var(--dark);
            position: relative;
            overflow: hidden;
        }

        /* توزيع الألوان والأقسام */
        .news { background-color: #8e785d; }
        .projects { background-color: var(--gold); }
        .ideas { background-color: #8b8841; }
        .opinions { background-color: #686259; }

        .grid-item h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            z-index: 2;
        }

        .grid-item p {
            font-size: 1.1rem;
            z-index: 2;
        }

        /* تأثير الحركة عند المرور بالماوس */
        .grid-item:hover {
            transform: scale(0.98);
            filter: brightness(1.1);
        }

        .grid-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 0;
            height: 5px;
            background: var(--dark);
            transition: 0.3s;
        }

        .grid-item:hover::after {
            width: 100%;
        }

        /* --- التجاوب مع الشاشات الصغيرة (الهاتف) --- */
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr; /* عمود واحد فقط */
                grid-template-rows: repeat(4, 25vh); /* كل قسم يأخذ ربع الطول */
                height: auto;
            }

            .center-collab {
                display: none; /* إخفاء الشعار العائم في الهاتف لتجنب التزاحم */
            }

            .grid-item h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="INCENTER.jpeg" alt="AAE Logo">
        </div>
        <div style="color: var(--gold); font-weight: bold;">INCENTER</div>
    </header>

    <main class="main-grid">
        <a href="News.html" href="#news" class="grid-item news">
            <h2>📰 الأخبار</h2>
            <p>آخر مستجدات الفضاء المدرسي والمركز</p>
        </a>

        <a href="Projects.html" href="#projects" class="grid-item projects">
            <h2>🚀 المشاريع</h2>
            <p>استعرض الحلول والمبادرات المنجزة</p>
        </a>

        <a href="main.html" href="#ideas" class="grid-item ideas">
            <h2>💡 إقتراح أفكار</h2>
            <p>شاركنا رؤيتك لتطوير البيئة التعليمية</p>
            
        </a>

        <a href="Forms.html" href="#opinions" class="grid-item opinions">
            <h2>💬 الآراء</h2>
            <p>منصة لعرض آراء الشركاء والمتعاونين</p>
        </a>
    </main>

</body>
</html>
