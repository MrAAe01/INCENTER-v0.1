<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="INCENTER - Copy.jpeg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCENTER | فضاء مدرسي متطور</title>
    
    <link rel="icon" type="image/jpeg" href="1000018164.jpg">

    <style>
        /* المتغيرات اللونية */
        :root {
            --primary-gold: #d4af37;
            --soft-bg: rgba(245, 230, 211, 0.9);
            --dark-text: #2c2c2c;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: rgba(245, 230, 211, 0.9); /* خلفية داكنة خارجية لتعزيز الألوان */
            background-image:url(TEAM.jpg);
            background-repeat: no-repeat;
            background-position: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* الحاوية الرئيسية المتجاوبة */
        .main-card {
            background-color: var(--soft-bg);
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 25px;
            border: 3px solid var(--primary-gold);
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            margin: 20px;
        }

        /* قسم الشركاء */
        .partners-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin: 25px 0;
            display: flex;
            flex-direction: row; /* افتراضي للشاشات الكبيرة */
            justify-content: center;
            align-items: center;
            gap: 20px;
            border: 1px solid #eee;
        }

        .partners-container img {
            max-width: 100px;
            height: auto;
            transition: transform 0.3s;
        }

        .x-separator {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-gold);
        }

        /* زر الولوج */
        .access-btn {
            display: inline-block;
            background-color: var(--primary-gold);
            color: #fff;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.4);
        }

        .access-btn:hover {
            background-color: #b8952e;
            transform: scale(1.05);
        }

        /* --- إعدادات التجاوب (Media Queries) --- */

        /* للهواتف (أصغر من 600px) */
        @media (max-width: 600px) {
            .main-card {
                padding: 20px;
                width: 95%;
            }

            .partners-container {
                flex-direction: column; /* تحويل الصور لتكون فوق بعضها */
                gap: 10px;
            }

            h1 { font-size: 1.5rem; }
            
            .access-btn {
                width: 80%; /* الزر يأخذ مساحة أكبر في الهاتف لسهولة الضغط */
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <img src="INCENTER.jpeg" width="100" style="border-radius: 100%;" alt="Logo">
        
        <h2 style="color: var(--dark-text);">INCENTER</h2>
        <p style="color: #555;">تعاون مشترك لتطوير الفضاء المدرسي</p>

        <div class="partners-container">
            <img src="icon.png" alt="OFPPT">
            <div class="x-separator">X</div>
            <img src="AAe Design.jpg" alt="AAE Design">
        </div>

        <p style="font-size: 0.9rem; color: var(--dark-text); margin-bottom: 25px;">
            نعمل معاً لتقديم حلول ذكية ومشاريع مبتكرة للمؤسسة.
        </p>

        <a href="Menu.html" class="access-btn">الولوج للمنصة</a>
        <br> <br>
        <a href="Contact.html" class="access-btn">ContactMe</a>
    </div>

</body>
</html>
