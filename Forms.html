<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="INCENTER - Copy.jpeg">
    <title>آراء الشركاء | INCENTER</title>
    <link rel="icon" type="image/jpeg" href="1000018164.jpg">
    
    <style>
        :root {
            --gold: #d4af37;
            --soft-beige: rgba(245, 230, 211, 0.95);
            --dark: #121212;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark);
            overflow: hidden; /* الحفاظ على وضع الشاشة الكاملة */
        }

        /* حاوية التقسيم الرئيسي */
        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .section {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--gold);
        }

        .header-label {
            background-color: var(--gold);
            color: #000;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* تصميم الـ Iframe ليكون متجاوباً بالكامل داخل القسم */
        .frame-wrapper {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            position: relative;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background-color: var(--soft-beige);
        }

        /* زر العودة الذكي */
        .back-nav {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 999;
            background: rgba(0,0,0,0.7);
            color: var(--gold);
            padding: 8px 15px;
            border: 1px solid var(--gold);
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
        }

        /* التجاوب مع الجوال */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                overflow-y: auto;
            }
            .section {
                height: 100vh; /* كل قسم يأخذ شاشة كاملة عند التمرير في الجوال */
                flex: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="section">
            <div class="header-label">📝 نموذج إرسال المقترحات والآراء</div>
            <div class="frame-wrapper">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfPFODbYQ7pgXL0xTjH51hpdVwm2ic5rSbZhHIEhbCHgP29Og/viewform?embedded=true">جاري التحميل...</iframe>
            </div>
        </div>

        <div class="section">
            <div class="header-label">📊 ملخص نتائج آراء الشركاء</div>
            <div class="frame-wrapper">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfPFODbYQ7pgXL0xTjH51hpdVwm2ic5rSbZhHIEhbCHgP29Og/viewanalytics">جاري التحميل...</iframe>
            </div>
        </div>

    </div>

</body>
</html>
